<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search images</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css"
    integrity="sha384-xeJqLiuOvjUBq3iGOjvSQSIlwrpqjSHXpduPd6rQpuiM3f5/ijby8pCsnbu5S81n" crossorigin="anonymous" />
  <link rel="stylesheet" href="./css/styles.css" />
 </head>

<body>
  <!-- HEADER -->
  <header class="header">
    <div class="container header-container">
      <form class="form" id="search-form">
        <input class="search-form-input" type="text" name="search_text" autocomplete="off"
          placeholder="Search images..." required />
        <button class="search-form-btn" type="submit">Search</button>
      </form>
      <span class="loader"></span>
    </div>
    </div>
  </header>

  <div class="btn-down">
    <button class="btn-down-wrapper__btn" id="to-down-btn" title="Go to bottom">
      <svg class="icon-arrow" width="32" height="32" aria-label="down">
        <use href="./img/icons.svg#icon-arrowdown"></use>
      </svg>
    </button>
  </div>
  <div class="btn-up">
    <button class="btn-up-wrapper__btn" id="to-top-btn" title="Go to top">
      <svg class="icon-arrow" width="32" height="32" aria-label="up">
        <use href="./img/icons.svg#icon-arrowup"></use>
      </svg>
    </button>
  </div>
  <!-- GALLERY  -->
  <div class="gallery-section">
  <!-- gallery -->
      <ul class="gallery">
      </ul>
  </div>
  <div>
    <div class="status-div">
      <label class="progress-label" for="loading"></label>
        <progress id="loading" max="100" value="10"></progress>
      <button type="click" class="load-more">Load more</button>
    </div>
  </div>
</body>

</html>
<script type="module" src="./main.js"></script>
